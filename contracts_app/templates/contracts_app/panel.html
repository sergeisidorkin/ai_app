{% load static %}
<div class="card shadow-sm mt-3 mb-3">
  <div class="card-body">

    <div id="contracts-pane"
         hx-get="{% url 'contracts_partial' %}"
         hx-trigger="load, contracts-updated from:body"
         hx-target="#contracts-pane"
         hx-swap="innerHTML"
         hx-indicator="#contracts-loading">
      <div id="contracts-loading" class="text-muted htmx-indicator d-inline-flex align-items-center gap-2">
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        <span>Загрузка договоров…</span>
      </div>
    </div>

  </div>
</div>
