<div class="d-flex justify-content-between align-items-center gap-3 mb-3 table-section-header flex-wrap" style="margin-top: 0px;">
    <h5 class="table-section-title mb-0">
        <i class="bi bi-layout-text-window me-2"></i>
        Договоры внештатных сотрудников
    </h5>
    <div class="d-flex align-items-center gap-2 ms-auto">
        <span class="small text-muted text-nowrap">Отображаемые поля:</span>
        <div class="tkp-colpicker" id="ct-colpicker-wrap">
            <button type="button" class="form-select form-select-sm text-start tkp-colpicker-btn" id="ct-colpicker-btn">
                Все поля
            </button>
            <div class="tkp-colpicker-menu" id="ct-colpicker-menu">
                <div class="tkp-colpicker-item">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="all" id="ct-col-all">
                        <label class="form-check-label" for="ct-col-all">Все поля</label>
                    </div>
                </div>
                {% for column in contract_template_column_picker %}
                    <div class="tkp-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   value="{{ column.value }}"
                                   id="ct-col-{{ column.value }}"
                                   {% if column.default_hidden %}data-default-hidden="true"{% else %}checked{% endif %}>
                            <label class="form-check-label" for="ct-col-{{ column.value }}">{{ column.label }}</label>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<div class="table-responsive">
    {% include "contracts_app/contract_templates_table_partial.html" %}
</div>
