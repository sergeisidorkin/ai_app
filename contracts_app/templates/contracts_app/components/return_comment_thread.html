<div class="comment-history-list contract-return-comment-thread" id="contract-return-comments-{{ performer.id }}"{% if oob %} hx-swap-oob="true"{% endif %}>
  {% if comments %}
    {% for entry in comments %}
      <div class="chk-comment-msg-row is-registered contract-return-comment-row contract-return-comment-row--{{ entry.author_role }}">
        <div class="chk-comment-bubble is-registered contract-return-comment-bubble contract-return-comment-bubble--{{ entry.author_role }}">
          <div class="chk-comment-meta">
            <span class="chk-comment-author">
              {% if entry.author %}
                {{ entry.author.get_full_name|default:entry.author.username }}
              {% else %}
                —
              {% endif %}
            </span>
            <span class="chk-comment-time">{{ entry.created_at|date:"d.m.Y H:i" }}</span>
          </div>
          <div class="chk-comment-text">{{ entry.text|linebreaksbr }}</div>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <div class="text-muted small">История пока пуста.</div>
  {% endif %}
</div>
