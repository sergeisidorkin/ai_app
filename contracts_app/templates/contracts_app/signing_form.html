{% load projects_extras %}
<div class="modal-header" data-modal-size="xl">
  <h5 class="modal-title">Подписание {% if performer.contract_is_addendum %}доп. соглашения №{{ performer.contract_addendum_number }}{% else %}договора{% endif %}</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
</div>

<form
  method="post"
  enctype="multipart/form-data"
  hx-post="{% url 'contracts_signing_edit' performer.id %}"
  hx-encoding="multipart/form-data"
  hx-target="#contracts-pane"
  hx-swap="innerHTML"
  hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('HX-Retarget')) window.bootstrap?.Modal.getOrCreateInstance(document.getElementById('contracts-modal'))?.hide()"
>
  {% csrf_token %}
  <div class="modal-body">
    {{ form.non_field_errors }}

    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Проект</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.registration %}{{ performer.registration.short_uid }}{% endif %}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Тип</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.registration.type_short_display }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Название</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.registration.name }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Исполнитель</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.executor }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Вид</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.contract_is_addendum %}ДС{{ performer.contract_addendum_number }}{% else %}Договор{% endif %}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Номер договора</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.contract_number|default:'—' }}">
      </div>

      <div class="col-md-6">
        <label class="form-label">Скан с подписью сотрудника</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.contract_scan_document|default:'' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Дата загрузки</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.contract_upload_date %}{{ performer.contract_upload_date|date:'d.m.Y H:i' }}{% endif %}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Дата отправки</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.contract_send_date %}{{ performer.contract_send_date|date:'d.m.Y H:i' }}{% endif %}">
      </div>

      <div class="col-12">
        {{ form.contract_employee_scan }}
      </div>

      <div class="col-md-6">
        <label class="form-label">Скан подписанного договора</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.contract_signed_scan|default:'' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Дата загрузки</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.contract_signed_scan_upload_date %}{{ performer.contract_signed_scan_upload_date|date:'d.m.Y H:i' }}{% endif %}">
      </div>

      <div class="col-12">
        {{ form.contract_signed_scan_file }}
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<style>
  #contracts-modal .readonly-field {
    background-color: #f8f9fa;
    color: #6c757d;
    pointer-events: none;
  }
</style>
<script>
(function() {
  var form = document.querySelector('#contracts-modal form');
  if (!form) return;
  function bindClearOnUpload(fileName, clearName) {
    var fileInput = form.querySelector('input[type="file"][name="' + fileName + '"]');
    var clearCb = form.querySelector('input[type="checkbox"][name="' + clearName + '"]');
    if (fileInput && clearCb) {
      fileInput.addEventListener('change', function() {
        if (this.files && this.files.length) {
          clearCb.checked = true;
          clearCb.disabled = true;
        }
      });
    }
  }
  bindClearOnUpload('contract_employee_scan', 'contract_employee_scan-clear');
  bindClearOnUpload('contract_signed_scan_file', 'contract_signed_scan_file-clear');
})();
</script>
