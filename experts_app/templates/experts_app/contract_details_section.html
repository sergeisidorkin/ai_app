<div id="contract-details-section">
    <div class="d-flex justify-content-between align-items-center mb-3 table-section-header" style="margin-top: 0px;">
        <h5 class="table-section-title">
            <i class="bi bi-table me-2"></i>
            Реквизиты физлиц-исполнителей
        </h5>
        <div class="d-flex align-items-center gap-2">
            <span class="small text-muted text-nowrap">Отображаемые поля:</span>
            <div class="epr-colpicker" id="ecd-colpicker-wrap">
                <button type="button" class="form-select form-select-sm text-start epr-colpicker-btn" id="ecd-colpicker-btn">
                    Все поля
                </button>
                <div class="epr-colpicker-menu" id="ecd-colpicker-menu">
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="all" id="ecd-col-all" checked>
                            <label class="form-check-label" for="ecd-col-all">Все поля</label>
                        </div>
                    </div>
                    {% for col_value, col_label in contract_details_column_picker %}
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="{{ col_value }}" id="ecd-col-{{ col_value }}" checked>
                            <label class="form-check-label" for="ecd-col-{{ col_value }}">{{ col_label }}</label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    {% include "experts_app/contract_details_table_partial.html" %}
</div>
