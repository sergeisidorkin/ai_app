<div id="experts-pane">
    <div class="d-flex justify-content-between align-items-center mb-3 table-section-header" style="margin-top: 0px;">
        <h5 class="table-section-title">
            <i class="bi bi-table me-2"></i>
            Специальности экспертов
        </h5>
    </div>

    <div class="table-responsive">
        {% include "experts_app/specialties_table_partial.html" %}
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 table-section-header" style="margin-top: 24px;">
        <h5 class="table-section-title">
            <i class="bi bi-table me-2"></i>
            База экспертов
        </h5>
        <div class="d-flex align-items-center gap-2">
            <span class="small text-muted text-nowrap">Отображаемые поля:</span>
            <div class="epr-colpicker" id="epr-colpicker-wrap">
                <button type="button" class="form-select form-select-sm text-start epr-colpicker-btn" id="epr-colpicker-btn">
                    Все поля
                </button>
                <div class="epr-colpicker-menu" id="epr-colpicker-menu">
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="all" id="epr-col-all" checked>
                            <label class="form-check-label" for="epr-col-all">Все поля</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="1" id="epr-col-1" checked>
                            <label class="form-check-label" for="epr-col-1">ФИО</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="2" id="epr-col-2" checked>
                            <label class="form-check-label" for="epr-col-2">Эл. почта (логин)</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="3" id="epr-col-3" checked>
                            <label class="form-check-label" for="epr-col-3">Дополнительная эл. почта</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="4" id="epr-col-4" checked>
                            <label class="form-check-label" for="epr-col-4">Телефон</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="5" id="epr-col-5" checked>
                            <label class="form-check-label" for="epr-col-5">Дополнительный телефон</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="6" id="epr-col-6" checked>
                            <label class="form-check-label" for="epr-col-6">Направление экспертизы</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="7" id="epr-col-7" checked>
                            <label class="form-check-label" for="epr-col-7">Специальность</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="8" id="epr-col-8" checked>
                            <label class="form-check-label" for="epr-col-8">Грейд</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="9" id="epr-col-9" checked>
                            <label class="form-check-label" for="epr-col-9">Страна</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="10" id="epr-col-10" checked>
                            <label class="form-check-label" for="epr-col-10">Регион</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="11" id="epr-col-11" checked>
                            <label class="form-check-label" for="epr-col-11">Статус</label>
                        </div>
                    </div>
                    <div class="epr-colpicker-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="12" id="epr-col-12" checked>
                            <label class="form-check-label" for="epr-col-12">Дата</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive" id="epr-table-wrap">
        {% include "experts_app/profiles_table_partial.html" %}
    </div>
</div>
