{% load static %}
<style>
  .epr-colpicker { position: relative; min-width: 14rem; }
  .epr-colpicker-btn {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding-right: 2rem !important;
  }
  .epr-colpicker-menu {
    display: none; position: absolute; top: 100%; right: 0;
    z-index: 1055; background: #fff; border: 1px solid #ced4da;
    border-radius: .25rem; max-height: 22rem; overflow-y: auto;
    min-width: 100%; padding: .25rem 0;
    box-shadow: 0 .25rem .5rem rgba(0,0,0,.15); margin-top: 2px;
  }
  .epr-colpicker-menu.show { display: block; }
  .epr-colpicker-item {
    display: flex; align-items: center; padding: .2rem .75rem;
    white-space: nowrap; margin: 0; font-size: .875em; color: #212529;
  }
  .epr-colpicker-item:hover { background: #f8f9fa; }
  .epr-colpicker-item .form-check { margin: 0; min-height: auto; }
  .epr-colpicker-item .form-check-label { cursor: pointer; user-select: none; }
</style>

<div class="card shadow-sm">
  <div class="card-body">

    <div id="experts-pane"
         hx-get="{% url 'experts_partial' %}"
         hx-trigger="load"
         hx-target="#experts-pane"
         hx-swap="innerHTML">
      <div class="text-muted htmx-indicator">Загрузка данных экспертов…</div>
    </div>

    <div class="modal fade" id="experts-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
        </div>
      </div>
    </div>

    <div class="modal fade" id="experts-profile-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
        </div>
      </div>
    </div>

    <div class="modal fade" id="experts-contract-details-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
        </div>
      </div>
    </div>

    <script>
      document.body.addEventListener('experts-updated', function () {
        ['experts-modal', 'experts-profile-modal', 'experts-contract-details-modal'].forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          var modal = bootstrap.Modal.getInstance(el) || bootstrap.Modal.getOrCreateInstance(el);
          modal.hide();
        });
      });

      document.addEventListener('htmx:afterSwap', function (e) {
        ['experts-modal', 'experts-profile-modal', 'experts-contract-details-modal'].forEach(function (id) {
          if (e.target && e.target.matches('#' + id + ' .modal-content')) {
            var m = bootstrap.Modal.getOrCreateInstance(document.getElementById(id));
            m.show();
          }
        });
      });
    </script>

    <script>
    (function() {
      var P = window.UIPref;

      var pickers = [
        { prefKey: 'experts:hiddenCols',    wrapId: 'epr-colpicker-wrap', btnId: 'epr-colpicker-btn', menuId: 'epr-colpicker-menu', allId: 'epr-col-all', tableId: 'epr-table' },
        { prefKey: 'experts:ecdHiddenCols', wrapId: 'ecd-colpicker-wrap', btnId: 'ecd-colpicker-btn', menuId: 'ecd-colpicker-menu', allId: 'ecd-col-all', tableId: 'ecd-table' },
      ];

      pickers.forEach(function(cfg) {
        cfg.hidden = P ? P.get(cfg.prefKey, {}) : {};
      });

      function saveHidden(cfg) {
        if (P) P.set(cfg.prefKey, cfg.hidden);
      }

      function updateBtnLabel(btn, menu) {
        var cbs = menu.querySelectorAll('input.form-check-input:not([value="all"])');
        var checked = 0;
        cbs.forEach(function(c) { if (c.checked) checked++; });
        btn.textContent = checked === cbs.length ? 'Все поля' : checked + ' из ' + cbs.length;
      }

      function applyVisibility(cfg) {
        var table = document.getElementById(cfg.tableId);
        if (!table) return;
        var hidden = Object.keys(cfg.hidden);
        table.querySelectorAll('[data-col]').forEach(function(cell) {
          cell.style.display = hidden.indexOf(cell.getAttribute('data-col')) !== -1 ? 'none' : '';
        });
      }

      function initPicker(cfg) {
        var wrap = document.getElementById(cfg.wrapId);
        var btn = document.getElementById(cfg.btnId);
        var menu = document.getElementById(cfg.menuId);
        if (!wrap || !btn || !menu) return;

        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          menu.classList.toggle('show');
        });

        var cbs = menu.querySelectorAll('input.form-check-input:not([value="all"])');
        cbs.forEach(function(cb) {
          if (cfg.hidden[cb.value]) cb.checked = false;
        });
        var allCb = document.getElementById(cfg.allId);
        if (allCb) {
          var allChecked = true;
          cbs.forEach(function(c) { if (!c.checked) allChecked = false; });
          allCb.checked = allChecked;
        }
        updateBtnLabel(btn, menu);
        applyVisibility(cfg);

        menu.addEventListener('change', function(e) {
          var cb = e.target;
          if (!cb.classList.contains('form-check-input')) return;
          var items = menu.querySelectorAll('input.form-check-input:not([value="all"])');
          if (cb.value === 'all') {
            items.forEach(function(c) { c.checked = cb.checked; });
          } else {
            var ac = document.getElementById(cfg.allId);
            var all = true;
            items.forEach(function(c) { if (!c.checked) all = false; });
            if (ac) ac.checked = all;
          }
          cfg.hidden = {};
          items.forEach(function(c) { if (!c.checked) cfg.hidden[c.value] = true; });
          saveHidden(cfg);
          updateBtnLabel(btn, menu);
          applyVisibility(cfg);
        });
      }

      function initAllPickers() {
        pickers.forEach(initPicker);
      }

      document.addEventListener('click', function(e) {
        pickers.forEach(function(cfg) {
          var wrap = document.getElementById(cfg.wrapId);
          var menu = document.getElementById(cfg.menuId);
          if (wrap && menu && !wrap.contains(e.target)) menu.classList.remove('show');
        });
      });

      document.body.addEventListener('htmx:afterSettle', function(e) {
        var pane = document.getElementById('experts-pane');
        if (pane && pane.contains(e.target)) initAllPickers();
      });
    })();
    </script>
  </div>
</div>
