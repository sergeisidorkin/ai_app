services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - nextcloud.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "${ROOT}/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "${ROOT}/redis:/data"

  nextcloud:
    image: nextcloud:apache
    restart: always
    env_file:
      - nextcloud.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:${NEXTCLOUD_LOCAL_PORT}:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_HOST}
      NEXTCLOUD_DATA_DIR: /var/www/html/data
      TRUSTED_PROXIES: 127.0.0.1
      OVERWRITEHOST: ${NEXTCLOUD_HOST}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_HOST}
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 1024M
    volumes:
      # Persist the full Nextcloud document root so upgrades and app state move
      # together with /opt/nextcloud during server migration.
      - "${ROOT}/html:/var/www/html"
      # Keep user files in a dedicated mount so data growth is easy to track.
      - "${ROOT}/data:/var/www/html/data"

  cron:
    image: nextcloud:apache
    restart: always
    entrypoint: /cron.sh
    env_file:
      - nextcloud.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_HOST}
      NEXTCLOUD_DATA_DIR: /var/www/html/data
      TRUSTED_PROXIES: 127.0.0.1
      OVERWRITEHOST: ${NEXTCLOUD_HOST}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_HOST}
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 1024M
    volumes:
      - "${ROOT}/html:/var/www/html"
      - "${ROOT}/data:/var/www/html/data"
