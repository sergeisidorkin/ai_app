<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    {% if action == "create" %}
      hx-post="{% url 'expertise_dir_form_create' %}"
    {% else %}
      hx-post="{% url 'expertise_dir_form_edit' direction.pk %}"
    {% endif %}
    hx-target="#policy-pane"
    hx-swap="outerHTML"
    id="expdir-form">
  <div class="modal-body">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Краткое имя</label>
      {{ form.short_name }}
    </div>
    <div class="mb-3">
      <label class="form-label">Наименование направления</label>
      {{ form.name }}
    </div>
    <div class="mb-3">
      <label class="form-label">Расчет стоимости услуг</label>
      {{ form.pricing_method }}
    </div>
    <div class="mb-3">
      <label class="form-label">Владелец</label>
      <div class="dropdown" id="expdir-owner-dropdown">
        <button class="form-select text-start" type="button"
                id="expdir-owner-toggle" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false"
                style="cursor:pointer; background-color:#fff;">
          <span class="js-expdir-owner-label">Группа</span>
        </button>
        <div class="dropdown-menu p-3" aria-labelledby="expdir-owner-toggle"
             style="min-width: 100%; max-height: 240px; overflow-y: auto;">
          <div class="form-check mb-2">
            <input class="form-check-input js-expdir-owner" type="checkbox"
                   name="owner_ids" value="__group__" id="expdir-owner-group"
                   {% if form.is_group_selected or not form.selected_owner_ids and not form.instance.pk %}checked{% endif %}>
            <label class="form-check-label" for="expdir-owner-group">Группа</label>
          </div>
          <hr class="dropdown-divider">
          {% for opt in form.owner_options %}
            <div class="form-check">
              <input class="form-check-input js-expdir-owner" type="checkbox"
                     name="owner_ids" value="{{ opt.pk }}" id="expdir-owner-{{ opt.pk }}"
                     {% if opt.pk in form.selected_owner_ids %}checked{% endif %}>
              <label class="form-check-label" for="expdir-owner-{{ opt.pk }}">
                {{ opt.short_name }}
              </label>
            </div>
          {% empty %}
            <div class="text-muted small">Нет компаний</div>
          {% endfor %}
        </div>
      </div>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<script>
(function() {
  const GROUP_VAL = "__group__";
  const dropdown = document.getElementById("expdir-owner-dropdown");
  if (!dropdown) return;
  const checks = dropdown.querySelectorAll(".js-expdir-owner");
  const label = dropdown.querySelector(".js-expdir-owner-label");
  const groupCb = document.getElementById("expdir-owner-group");

  function updateLabel() {
    const selected = Array.from(checks).filter(cb => cb.checked);
    if (!selected.length) { label.textContent = "Группа"; return; }
    if (groupCb && groupCb.checked) { label.textContent = "Группа"; return; }
    if (selected.length === 1) {
      label.textContent = selected[0].nextElementSibling?.textContent?.trim() || "1";
      return;
    }
    label.textContent = selected.length + " выбрано";
  }

  checks.forEach(cb => {
    cb.addEventListener("change", function() {
      if (this.value === GROUP_VAL && this.checked) {
        checks.forEach(c => { if (c.value !== GROUP_VAL) c.checked = false; });
      } else if (this.value !== GROUP_VAL && this.checked) {
        if (groupCb) groupCb.checked = false;
      }
      updateLabel();
    });
  });

  updateLabel();
})();
</script>
