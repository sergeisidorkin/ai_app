<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    {% if action == "create" %}
      hx-post="{% url 'structure_form_create' %}"
    {% else %}
      hx-post="{% url 'structure_form_edit' structure.pk %}"
    {% endif %}
    hx-target="#policy-pane"
    hx-swap="outerHTML">
  <div class="modal-body modal-body-scroll">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Продукт</label>
      {{ form.product }}
    </div>
    <div class="mb-3">
      <label class="form-label">Код</label>
      {{ form.section_code }}
    </div>
    <div class="mb-3">
      <label class="form-label">Раздел (услуга)</label>
      {{ form.section }}
    </div>
    <div class="mb-3">
      <label class="form-label">Подраздел</label>
      {{ form.subsections }}
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<script>
(function() {
  var productSelect = document.getElementById('id_product');
  var sectionSelect = document.getElementById('id_section');
  var sectionCodeInput = document.getElementById('id_section_code');
  var sectionsByProduct = {{ sections_by_product_json|safe }};
  if (!productSelect || !sectionSelect) return;

  function syncSectionCode() {
    if (!sectionCodeInput) return;
    var selected = sectionSelect.options[sectionSelect.selectedIndex];
    sectionCodeInput.value = selected && selected.value ? (selected.dataset.code || '') : '';
  }

  function rebuildSections() {
    var productId = productSelect.value || '';
    var previous = sectionSelect.value || '';
    var options = sectionsByProduct[productId] || [];
    sectionSelect.innerHTML = '';
    var placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = productId ? '---------' : '— выберите продукт —';
    sectionSelect.appendChild(placeholder);
    options.forEach(function(item) {
      var option = document.createElement('option');
      option.value = String(item.id);
      option.textContent = item.label;
      option.dataset.shortLabel = item.displayLabel || '';
      option.dataset.code = item.code || '';
      sectionSelect.appendChild(option);
    });
    if (Array.from(sectionSelect.options).some(function(option) { return option.value === previous; })) {
      sectionSelect.value = previous;
    }
    syncSectionCode();
    if (window.syncPolicySectionSelectDisplay) {
      window.syncPolicySectionSelectDisplay(sectionSelect);
    }
  }

  productSelect.addEventListener('change', rebuildSections);
  sectionSelect.addEventListener('change', function() {
    syncSectionCode();
    if (window.syncPolicySectionSelectDisplay) {
      window.syncPolicySectionSelectDisplay(sectionSelect);
    }
  });
  rebuildSections();
})();
</script>
