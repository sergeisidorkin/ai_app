<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    style="display:flex; flex-direction:column; overflow:hidden; flex:1 1 auto; min-height:0;"
    {% if action == "create" %}
      hx-post="{% url 'prs_form_create' %}"
    {% else %}
      hx-post="{% url 'prs_form_edit' item.pk %}"
    {% endif %}
    hx-target="#contacts-persons-table-wrap"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('HX-Retarget')) window.bootstrap?.Modal.getOrCreateInstance(document.getElementById('contacts-modal'))?.hide()">
  <div class="modal-body" style="overflow-y:auto; flex:1 1 auto; min-height:0;">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Фамилия</label>
        {{ form.last_name }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Имя</label>
        {{ form.first_name }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Отчество</label>
        {{ form.middle_name }}
      </div>
      <div class="col-md-8">
        <label class="form-label">ФИО (полное) в родительном падеже</label>
        {{ form.full_name_genitive }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Пол</label>
        {{ form.gender }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Дата рождения</label>
        {{ form.birth_date }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Пользователь</label>
        <input type="text"
               class="form-control readonly-field"
               value="{{ item.get_user_kind_display|default:'' }}"
               readonly
               tabindex="-1">
      </div>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger mt-3 mb-0">
      Проверьте введённые данные.
    </div>
    {% endif %}
  </div>
  <div class="modal-footer" style="flex-shrink:0;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>
