<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    style="display:flex; flex-direction:column; overflow:hidden; flex:1 1 auto; min-height:0;"
    {% if action == "create" %}
      hx-post="{% url 'ber_form_create' %}"
    {% else %}
      hx-post="{% url 'ber_form_edit' item.pk %}"
    {% endif %}
    hx-target="#business-entities-table-wrap"
    hx-swap="innerHTML">
  <div class="modal-body" style="overflow-y:auto; flex:1 1 auto; min-height:0;">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Наименование</label>
      {{ form.name }}
    </div>
    <div class="mb-3">
      <label class="form-label">Комментарий</label>
      {{ form.comment }}
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Запись</label>
        <input
          type="text"
          class="form-control"
          readonly
          tabindex="-1"
          style="background-color:#f8f9fa; color:#6c757d;"
          value="{{ record_date_display|default:'' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Автор записи</label>
        <input
          type="text"
          class="form-control"
          readonly
          tabindex="-1"
          style="background-color:#f8f9fa; color:#6c757d;"
          value="{{ record_author_display|default:'' }}">
      </div>
      <div class="col-12">
        <label class="form-label">Источник</label>
        <input
          type="text"
          class="form-control"
          readonly
          tabindex="-1"
          style="background-color:#f8f9fa; color:#6c757d;"
          value="{{ source_display|default:'' }}">
      </div>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer" style="flex-shrink:0;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<script>
(function() {
  function replaceQuotes(el) {
    var v = el.value;
    if (v.indexOf('"') === -1) return;
    var pos = el.selectionStart;
    var out = '';
    for (var i = 0; i < v.length; i++) {
      if (v[i] === '"') {
        var prev = out.length ? out[out.length - 1] : '';
        out += (!prev || /[\s(\[{\u00AB]/.test(prev)) ? '\u00AB' : '\u00BB';
      } else {
        out += v[i];
      }
    }
    el.value = out;
    el.setSelectionRange(pos, pos);
  }

  var nameEl = document.getElementById('id_name');
  if (nameEl) nameEl.addEventListener('input', function() { replaceQuotes(this); });
})();
</script>
