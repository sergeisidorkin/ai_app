<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    style="display:flex; flex-direction:column; overflow:hidden; flex:1 1 auto; min-height:0;"
    {% if action == "create" %}
      hx-post="{% url 'rfs_form_create' %}"
    {% else %}
      hx-post="{% url 'rfs_form_edit' item.pk %}"
    {% endif %}
    hx-target="#classifiers-pane"
    hx-swap="outerHTML">
  <div class="modal-body" style="overflow-y:auto; flex:1 1 auto; min-height:0;">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Наименование субъекта Российской Федерации</label>
      {{ form.subject_name }}
    </div>
    <div class="mb-3">
      <label class="form-label">Код региона ОКТМО</label>
      {{ form.oktmo_code }}
    </div>
    <div class="mb-3">
      <label class="form-label">Код ФНС России</label>
      {{ form.fns_code }}
    </div>
    <div class="mb-3">
      <label class="form-label">Источник</label>
      {{ form.source }}
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer" style="flex-shrink:0;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<script>
(function() {
  var subjectEl = document.getElementById('id_subject_name');
  var oktmoEl = document.getElementById('id_oktmo_code');
  if (!subjectEl || !oktmoEl) return;

  subjectEl.addEventListener('change', function() {
    if (!this.value) {
      oktmoEl.value = '';
      return;
    }
    fetch('{% url "rfs_oktmo_for_subject" %}?subject_name=' + encodeURIComponent(this.value))
      .then(function(r) { return r.json(); })
      .then(function(data) { oktmoEl.value = data.code || ''; })
      .catch(function() { oktmoEl.value = ''; });
  });
})();
</script>
