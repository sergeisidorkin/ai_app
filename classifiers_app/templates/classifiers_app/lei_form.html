<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    style="display:flex; flex-direction:column; overflow:hidden; flex:1 1 auto; min-height:0;"
    {% if action == "create" %}
      hx-post="{% url 'lei_form_create' %}"
    {% else %}
      hx-post="{% url 'lei_form_edit' lei.pk %}"
    {% endif %}
    hx-target="#classifiers-pane"
    hx-swap="outerHTML">
  <div class="modal-body" style="overflow-y:auto; flex:1 1 auto; min-height:0;">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Идентификатор</label>
      {{ form.identifier }}
    </div>

    <div class="mb-3">
      <label class="form-label">Наименование идентификатора (полное)</label>
      {{ form.full_name }}
    </div>

    <div class="mb-3">
      <label class="form-label">Страна</label>
      {{ form.country }}
    </div>

    <div class="mb-3">
      <label class="form-label">Код</label>
      {{ form.code }}
      <div class="form-text">Заполняется автоматически при выборе страны</div>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer" style="flex-shrink:0;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<script>
(function() {
  var countrySelect = document.getElementById('lei-country-select');
  var codeField = document.getElementById('lei-code-field');
  if (!countrySelect || !codeField) return;

  var countryCodes = {{ country_codes_json|safe }};

  function updateCode() {
    var code = countryCodes[countrySelect.value] || '';
    codeField.value = code;
  }

  countrySelect.addEventListener('change', updateCode);
  updateCode();
})();
</script>
