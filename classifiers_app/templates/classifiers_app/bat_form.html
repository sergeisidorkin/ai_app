<div class="modal-header">
  <h5 class="modal-title">
    {% if action == "create" %}Добавить строку{% else %}Изменить строку{% endif %}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form
    method="post"
    style="display:flex; flex-direction:column; overflow:hidden; flex:1 1 auto; min-height:0;"
    {% if action == "create" %}
      hx-post="{% url 'bat_form_create' %}"
    {% else %}
      hx-post="{% url 'bat_form_edit' item.pk %}"
    {% endif %}
    hx-target="#business-entity-attributes-table-wrap"
    hx-swap="innerHTML">
  <div class="modal-body" style="overflow-y:auto; flex:1 1 auto; min-height:0;">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Наименование атрибута</label>
      {{ form.attribute_name }}
    </div>
    <div class="mb-3">
      <label class="form-label">Наименование подраздела</label>
      {{ form.subsection_name }}
    </div>

    {% if form.errors %}
      <div class="alert alert-danger mb-0">
        Проверьте введённые данные.
      </div>
    {% endif %}
  </div>
  <div class="modal-footer" style="flex-shrink:0;">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>
