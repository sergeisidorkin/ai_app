{% url 'worktime_partial' as default_worktime_partial_url %}
<div class="card shadow-sm mt-3">
  <div class="card-body">
    <div class="worktime-panel"
         data-worktime-panel
         hx-get="{{ partial_url|default:default_worktime_partial_url }}"
         hx-trigger="{{ load_event|default:'worktime-timesheet-load' }} once from:body, worktime-updated from:body"
         hx-target="this"
         hx-swap="innerHTML"
         hx-indicator="find .htmx-indicator">
      <div class="text-muted htmx-indicator">Загрузка табеля учета времени…</div>
    </div>
  </div>
</div>
