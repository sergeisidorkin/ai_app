{% url 'worktime_partial' as default_worktime_partial_url %}
<div class="card shadow-sm mt-3">
  <div class="card-body">
    <div class="worktime-panel"
         data-worktime-panel
         data-worktime-load-event="{{ load_event|default:'worktime-timesheet-load' }}"
         hx-get="{{ partial_url|default:default_worktime_partial_url }}"
         hx-trigger="{{ load_event|default:'worktime-timesheet-load' }}-ready once from:body, worktime-updated-{{ load_event|default:'worktime-timesheet-load' }}-ready from:body"
         hx-target="this"
         hx-swap="innerHTML"
         hx-indicator="find .htmx-indicator">
      <div class="text-muted htmx-indicator d-inline-flex align-items-center gap-2">
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        <span>Загрузка фонда рабочего времени...</span>
      </div>
    </div>
    <script>
      (function () {
        if (window.__worktimePanelPreferenceBootstrapBound) return;
        window.__worktimePanelPreferenceBootstrapBound = true;

        function updateWorktimePanelRequestUrl(panel) {
          if (!panel || !window.localStorage) return;
          if (!panel.closest || !panel.closest('#worktime-content-timesheet')) return;
          var baseUrl = panel.dataset.worktimeBaseUrl || panel.getAttribute('hx-get') || '';
          if (!baseUrl) return;
          panel.dataset.worktimeBaseUrl = baseUrl;

          var scale = (window.localStorage.getItem('worktime.general.scale') || '').toLowerCase() === 'year' ? 'year' : 'month';
          var breakdown = (window.localStorage.getItem('worktime.general.breakdown') || '').toLowerCase() === 'activities'
            ? 'activities'
            : 'employees';
          var histSort = (window.localStorage.getItem('worktime.general.histSort') || '').toLowerCase();
          histSort = histSort === 'asc' || histSort === 'desc' ? histSort : '';
          var storedPeriod = scale === 'year'
            ? (window.localStorage.getItem('worktime.general.period.year') || '').trim()
            : (window.localStorage.getItem('worktime.general.period.month') || '').trim();

          var params = new URLSearchParams();
          params.set('scale', scale);
          params.set('breakdown', breakdown);
          if (storedPeriod) {
            params.set('period', storedPeriod);
          }
          if (histSort) {
            params.set('hist_sort', histSort);
          }

          panel.setAttribute('hx-get', params.toString() ? (baseUrl + '?' + params.toString()) : baseUrl);
        }

        function dispatchReadyEvent(name) {
          if (!name) return;
          document.body.dispatchEvent(new Event(name));
        }

        function syncPanelAndDispatchReady(panel, reason) {
          if (!panel) return;
          updateWorktimePanelRequestUrl(panel);
          var loadEvent = panel.dataset.worktimeLoadEvent || '';
          if (!loadEvent) return;
          if (reason === 'sync-only') {
            return;
          }
          if (reason === 'updated') {
            dispatchReadyEvent('worktime-updated-' + loadEvent + '-ready');
            return;
          }
          dispatchReadyEvent(loadEvent + '-ready');
        }

        function syncGeneralPanel() {
          return document.querySelector('#worktime-content-timesheet [data-worktime-panel]');
        }

        function syncKnownPanelUrls() {
          syncPanelAndDispatchReady(syncGeneralPanel(), 'sync-only');
          var personalPanel = document.querySelector('#worktime-content-personal-timesheet [data-worktime-panel]');
          if (personalPanel) {
            updateWorktimePanelRequestUrl(personalPanel);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', syncKnownPanelUrls);
        } else {
          syncKnownPanelUrls();
        }

        document.body.addEventListener('worktime-timesheet-load', function () {
          syncPanelAndDispatchReady(syncGeneralPanel(), 'load');
        });

        document.body.addEventListener('worktime-personal-timesheet-load', function () {
          var personalPanel = document.querySelector('#worktime-content-personal-timesheet [data-worktime-panel]');
          syncPanelAndDispatchReady(personalPanel, 'load');
        });

        document.body.addEventListener('worktime-updated', function () {
          syncPanelAndDispatchReady(syncGeneralPanel(), 'updated');
          var personalPanel = document.querySelector('#worktime-content-personal-timesheet [data-worktime-panel]');
          syncPanelAndDispatchReady(personalPanel, 'updated');
        });
      })();
    </script>
  </div>
</div>
