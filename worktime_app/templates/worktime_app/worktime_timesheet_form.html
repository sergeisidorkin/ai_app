<div class="modal-header" data-modal-size="lg">
  <h5 class="modal-title">Редактировать рабочее время</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
</div>

<form
  method="post"
  hx-post="{% url 'worktime_edit' performer.id %}"
  hx-target="#worktime-modal .modal-content"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  <div class="modal-body">
    {{ form.non_field_errors }}

    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Проект</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.registration %}{{ performer.registration.short_uid }}{% endif %}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Тип</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{% if performer.registration.type %}{{ performer.registration.type.short_name|default:performer.registration.type }}{% endif %}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Исполнитель</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.executor }}">
      </div>
      <div class="col-12">
        <label class="form-label">Название</label>
        <input type="text" class="form-control readonly-field" readonly tabindex="-1"
               value="{{ performer.registration.name }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Количество часов</label>
        {{ form.work_hours }}
        {% if form.work_hours.errors %}
          <div class="invalid-feedback d-block">{{ form.work_hours.errors|join:", " }}</div>
        {% endif %}
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>

<style>
  #worktime-modal .readonly-field {
    background-color: #f8f9fa;
    color: #6c757d;
    pointer-events: none;
  }
</style>
